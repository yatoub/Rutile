name: Changelog & Release PR

# Runs on every push to main.
#
# Two outcomes depending on the state of the branch:
#   - Pending releasable commits exist → open or refresh the release PR
#     (bumps version in Cargo.toml, updates CHANGELOG.md),
#     then auto-merge it once CI passes (no manual merge needed).
#   - Release PR was merged → create the git tag and the GitHub Release
#     (changelog as release notes). The tag push then triggers release.yml,
#     which builds and attaches the binary/.deb/.rpm/SHA256SUMS.

on:
  push:
    branches: [main]

permissions:
  pull-requests: write
  contents: write

jobs:
  release-plz:
    name: Run release-plz
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Do NOT cancel in progress: two concurrent runs can corrupt the release state.
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          fetch-depth: 0 # release-plz needs the full git history

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4  # stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9  # v0.5
        env:
          # Must be a PAT, not GITHUB_TOKEN: pushes/tags made with the
          # built-in token don't fire other workflows' events (release.yml
          # would never trigger on the resulting tag push), and this repo's
          # branch protection requires an admin push to bypass the PR
          # requirement — same reasoning as RUTILE_RELEASE_TOKEN, reused
          # here (needs "Pull requests: Read and write" added to that PAT's
          # scope in addition to "Contents: Read and write").
          GITHUB_TOKEN: ${{ secrets.RUTILE_RELEASE_TOKEN }}

      - name: Auto-merge release PR
        if: steps.release-plz.outputs.prs_created == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.RUTILE_RELEASE_TOKEN }}
          PR_URL: ${{ fromJson(steps.release-plz.outputs.pr).html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
