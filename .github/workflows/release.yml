name: Release

# Triggered by a version tag (vX.Y.Z), or manually via workflow_dispatch to
# re-publish an existing tag.
#
# Rutile is a GTK4/libadwaita/vte4 desktop app — Linux-only, unlike a
# portable CLI tool, so this pipeline (unlike a cross-platform release)
# targets a single glibc-compat Linux binary plus DEB/RPM packages built
# from it.
#
# Pipeline:
#   build       — one x86_64 Linux binary, uploaded to the GitHub Release
#   build-deb   — DEB package (built from the binary's own recipe)
#   build-rpm   — Fedora RPM package (built from source, in a Fedora container)
#
# After build:
#   update-pkgbuild — commits refreshed PKGBUILD/PKGBUILD.bin/rutile.spec to
#                     main, which triggers aur-publish.yml
#
# NOTE: .deb/.rpm are attached to the GitHub Release only — this does not
# stand up hosted APT/DNF repositories (that needs a gh-pages branch, GPG
# signing key, and more infrastructure than a v0.1 release warrants; can be
# added later the same way susshi does it).

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to re-publish (e.g. v0.1.0)"
        required: true

permissions:
  contents: read

# A manual re-publish (workflow_dispatch) could otherwise race the run
# triggered by the original tag push for the same tag.
concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  # ── Linux binary ──────────────────────────────────────────────────────────

  build:
    name: Binary — x86_64
    # ubuntu-latest, matching ci.yml: unlike a static CLI tool, Rutile
    # needs a genuinely modern GTK4/libadwaita/vte4 *runtime* on the
    # user's machine anyway (see Cargo.toml's feature flags), so building
    # on an older LTS for glibc-compat doesn't meaningfully broaden
    # compatibility here — a system too old for glibc 2.39 almost
    # certainly lacks GTK4 4.14+/libadwaita/vte4 too. ubuntu-22.04 also
    # doesn't ship libvte-2.91-gtk4-dev at all (only 23.10+), which is
    # what actually broke this job the first time around.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install GTK4/libadwaita/vte4 dev packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libvte-2.91-gtk4-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4  # stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Build
        run: cargo build --release

      - name: Copy binary to release asset name
        run: |
          cp target/release/rutile rutile-linux-x86_64
          chmod +x rutile-linux-x86_64

      # SLSA build provenance: cryptographically ties this artifact to this
      # exact repo/commit/workflow run — verifiable via `gh attestation
      # verify`, unlike SHA256SUMS.txt which only proves the download wasn't
      # corrupted, not where it actually came from.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a  # v3
        with:
          subject-path: rutile-linux-x86_64

      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de  # v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: rutile-linux-x86_64
          asset_name: rutile-linux-x86_64
          tag: ${{ github.event.inputs.tag || github.ref }}
          overwrite: true

  # ── DEB package ───────────────────────────────────────────────────────────

  build-deb:
    name: DEB package
    # See the `build` job's comment above re: ubuntu-latest vs. an older LTS.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install GTK4/libadwaita/vte4 dev packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libvte-2.91-gtk4-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4  # stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build DEB
        run: |
          cargo build --release
          cargo deb --no-build

      - name: Smoke test (install + linked libraries resolve)
        run: |
          sudo dpkg -i target/debian/rutile_*.deb
          ldd "$(command -v rutile)" | grep -qi "not found" && exit 1 || true

      - name: Install Xvfb + D-Bus for launch smoke test
        run: |
          sudo apt-get install -y xvfb dbus-x11

      # Release gate: fails the whole Release run (blocking aur-publish.yml
      # and update-pkgbuild) if the actual installed package can't launch,
      # not just that its shared libraries resolve.
      - name: Smoke test (launch under Xvfb)
        uses: ./.github/actions/smoke-launch

      - name: Remove test install
        run: sudo dpkg -r rutile

      - name: Attest build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a  # v3
        with:
          subject-path: target/debian/rutile_*.deb

      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de  # v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: target/debian/rutile_*.deb
          file_glob: true
          tag: ${{ github.event.inputs.tag || github.ref }}
          overwrite: true

  # ── RPM package (Fedora) ──────────────────────────────────────────────────

  build-rpm:
    name: RPM package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Pinned by digest (fedora:42 as of this pin), same reasoning as the
    # SHA-pinned GitHub Actions above: an unpinned tag can be updated to a
    # different image without notice, changing the build environment.
    # fedora:41 shipped rustc 1.91.1 in its repos, below our MSRV of 1.92
    # (gtk4-rs 0.11.4's real floor, see CLAUDE.md) — build failed with
    # "rustc 1.91.1 is not supported by ... requires rustc 1.92". fedora:42
    # ships rustc 1.95.0, verified via `docker run fedora:42 dnf info rust`.
    container: fedora@sha256:99e203b80b1c3d8f7e161ec10a68fd02b081ef83a3963553e513c82846b97814
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install build dependencies
        run: |
          dnf install -y rust cargo gtk4-devel libadwaita-devel vte291-gtk4-devel \
            pkgconf-pkg-config desktop-file-utils rpm-build rpmdevtools git

      - name: Cache Cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6
        with:
          path: |
            /github/home/.cargo/registry/index
            /github/home/.cargo/registry/cache
            /github/home/.cargo/git/db
          key: fedora-rpm-x86_64-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            fedora-rpm-x86_64-

      - name: Set up rpmbuild tree
        run: rpmdev-setuptree

      - name: Patch version in spec file
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          sed -i "s/^Version:.*/Version:        ${VERSION}/" rutile.spec

      - name: Fetch source archive
        run: spectool -g -R rutile.spec

      - name: Build RPM
        run: rpmbuild -ba rutile.spec

      - name: Smoke test (install + linked libraries resolve)
        run: |
          rpm_file=$(find /github/home/rpmbuild/RPMS -name "rutile-*.rpm" | grep -v debug | head -n1)
          dnf install -y "${rpm_file}"
          ldd "$(command -v rutile)" | grep -qi "not found" && exit 1 || true

      - name: Install Xvfb + D-Bus for launch smoke test
        run: dnf install -y xorg-x11-server-Xvfb dbus-x11

      # Release gate: fails the whole Release run (blocking aur-publish.yml
      # and update-pkgbuild) if the actual installed package can't launch,
      # not just that its shared libraries resolve. Caught a real bug here
      # while verifying this against the published v0.2.1 RPM: rutile
      # aborted with "Couldn't open libGLESv2.so.2" — gtk4/libepoxy
      # dlopen() it at runtime to probe for a GLES EGL backend, so RPM's
      # automatic dependency scanner (ELF NEEDED list only) never picked it
      # up. Fixed via rutile.spec's explicit `Requires: libglvnd-gles`.
      - name: Smoke test (launch under Xvfb)
        uses: ./.github/actions/smoke-launch

      - name: Remove test install
        run: rpm -e rutile

      - name: Attest build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a  # v3
        with:
          subject-path: /github/home/rpmbuild/RPMS/**/*.rpm

      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de  # v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: /github/home/rpmbuild/RPMS/**/*.rpm
          file_glob: true
          tag: ${{ github.event.inputs.tag || github.ref }}
          overwrite: true

  # ── Arch package smoke test (pre-publish release gate) ─────────────────────

  smoke-arch:
    name: Smoke test — Arch package (install + launch)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    # Same digest release.yml already pins for regenerating .SRCINFO in
    # update-pkgbuild. Builds the exact PKGBUILD.bin content aur-publish.yml's
    # aur-bin job is about to push to AUR (same checksum-patch logic) and
    # installs + launches it under Xvfb *before* anything reaches AUR — a
    # failure here fails the whole Release run, which blocks both
    # update-pkgbuild and aur-publish.yml (the latter only fires when this
    # workflow_run's overall conclusion is 'success').
    container: archlinux@sha256:fe6972d4dc1f660c0c10f4c41b2de8986bab89e7e2955378f8beadb8ebcd7433
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install build + runtime dependencies
        run: |
          pacman -Sy --noconfirm git base-devel curl xorg-server-xvfb dbus \
            gtk4 libadwaita vte4

      - name: Compute checksums (source archive + Linux binary)
        id: checksums
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          curl -fsSL "https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz" -o archive.tar.gz
          curl -fsSL "https://github.com/${{ github.repository }}/releases/download/${TAG}/rutile-linux-x86_64" -o rutile-linux-x86_64
          echo "src=$(b2sum archive.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "bin=$(b2sum rutile-linux-x86_64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Patch PKGBUILD.bin
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          B2SUM_SRC: ${{ steps.checksums.outputs.src }}
          B2SUM_BIN: ${{ steps.checksums.outputs.bin }}
        run: |
          VERSION="${TAG#v}"
          cp PKGBUILD.bin PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^b2sums=(.*/b2sums=(${B2SUM_SRC})/" PKGBUILD
          sed -i "s/^b2sums_x86_64=(.*/b2sums_x86_64=(${B2SUM_BIN})/" PKGBUILD

      - name: Build package as non-root user
        run: |
          useradd -m builder
          chown -R builder:builder .
          su builder -s /bin/bash -c 'makepkg -c --noconfirm'

      - name: Install package
        # [0-9]* excludes the debug package makepkg -c also produces
        # (rutile-bin-debug-*.pkg.tar.zst) — only the real package is wanted.
        run: pacman -U --noconfirm rutile-bin-[0-9]*.pkg.tar.zst

      # Release gate: see smoke-launch's own description for the pass/fail
      # contract shared with build-deb/build-rpm.
      - name: Smoke test (launch under Xvfb)
        uses: ./.github/actions/smoke-launch

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          github-token: ${{ github.token }}
          title: "Arch package smoke test failed for ${{ github.event.inputs.tag || github.ref_name }}"
          body: "smoke-arch failed. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ── Checksums (so a downloaded artifact's provenance is verifiable) ───────

  checksums:
    name: Publish SHA256SUMS
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, build-deb, build-rpm]
    permissions:
      contents: write
    steps:
      - name: Download all release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: gh release download "$TAG" --repo "${{ github.repository }}" --dir assets --skip-existing

      - name: Generate SHA256SUMS.txt
        run: |
          cd assets
          sha256sum -- * > ../SHA256SUMS.txt
          cd ..
          cat SHA256SUMS.txt

      - name: Upload to GitHub Release
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de  # v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: SHA256SUMS.txt
          tag: ${{ github.event.inputs.tag || github.ref }}
          overwrite: true

  # ── Arch Linux PKGBUILD (committed to repo) ───────────────────────────────

  update-pkgbuild:
    name: Update PKGBUILD in repo
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # build-deb/build-rpm/smoke-arch all needed (not just `build`): don't
    # commit a version bump to PKGBUILD/PKGBUILD.bin/rutile.spec — which
    # feeds straight into aur-publish.yml — if any package failed to build
    # or failed its install+launch smoke test.
    needs: [build, build-deb, build-rpm, smoke-arch]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          # PAT required: this push must trigger aur-publish.yml (GITHUB_TOKEN
          # pushes are silently ignored by workflow event triggers), and must
          # bypass main's PR-required branch protection as an admin push
          # (the default GITHUB_TOKEN actor is not an admin and would be
          # rejected). Add a fine-grained PAT from an admin account as the
          # `RUTILE_RELEASE_TOKEN` repo secret before this job can succeed.
          token: ${{ secrets.RUTILE_RELEASE_TOKEN }}
          ref: main

      - name: Update PKGBUILD
        run: bash scripts/update-pkgbuild.sh

      - name: Regenerate .SRCINFO
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/pkg" \
            -w /pkg \
            archlinux@sha256:fe6972d4dc1f660c0c10f4c41b2de8986bab89e7e2955378f8beadb8ebcd7433 \
            bash -c "
              pacman -Sy --noconfirm base-devel > /dev/null 2>&1
              useradd -m builder
              chown -R builder:builder /pkg
              su builder -s /bin/bash -c 'cd /pkg && makepkg --printsrcinfo > /pkg/.SRCINFO'
            "

      - name: Fix workspace permissions after Docker
        run: sudo chown -R "$USER" .

      - name: Commit and push if changed
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD PKGBUILD.bin .SRCINFO rutile.spec
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          VERSION="${TAG#v}"
          git commit -m "chore(release): update PKGBUILD to v${VERSION}"
          git push

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          github-token: ${{ github.token }}
          title: "PKGBUILD update failed for ${{ github.event.inputs.tag || github.ref_name }}"
          body: "update-pkgbuild failed. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ── Trigger AUR publish explicitly on manual re-publish ────────────────────

  trigger-aur-publish:
    name: Trigger AUR publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build, build-deb, build-rpm, smoke-arch]
    # Only for workflow_dispatch: aur-publish.yml's own `workflow_run` trigger
    # already handles the normal tag-push case correctly, because head_sha
    # there is the tag commit itself. For a manual re-publish, this job is
    # dispatched against a branch (e.g. `main`) so that the *workflow file*
    # picks up fixes merged after the tag was cut (see CLAUDE.md: re-running
    # against the tag itself replays the workflow AS IT WAS AT THAT TAG) —
    # but that means the resulting workflow_run's head_sha is the branch's
    # HEAD, not the tag commit, so aur-publish.yml's tag-resolution (matching
    # head_sha against remote tags) can't find it and fails closed. Trigger
    # aur-publish.yml directly instead, passing the tag explicitly.
    if: github.event_name == 'workflow_dispatch'
    permissions:
      actions: write
    steps:
      - name: Dispatch aur-publish.yml with explicit tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag }}
        run: |
          gh workflow run aur-publish.yml --repo "${{ github.repository }}" --ref main -f "tag=${TAG}"
